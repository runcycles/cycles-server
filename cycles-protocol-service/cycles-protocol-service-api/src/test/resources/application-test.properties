# Test profile — Redis host/port injected by Testcontainers via @DynamicPropertySource
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=true
spring.jackson.default-property-inclusion=non_null
logging.level.io.runcycles.protocol=DEBUG

# Prevent expiry sweep from firing before TestContainers Redis is ready
cycles.expiry.initial-delay-ms=999999999

# Disable tenant config cache in tests so each test gets fresh config from Redis
cycles.tenant-config.cache-ttl-ms=0
