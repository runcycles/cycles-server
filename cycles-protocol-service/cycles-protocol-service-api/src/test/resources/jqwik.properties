# jqwik runtime configuration.
# Overridable per-invocation via system properties, e.g. -Djqwik.tries.default=100

# Default number of tries per @Property when the annotation does not specify one explicitly.
# Set to 20 for PR-feedback speed. Nightly CI overrides to 100 via the workflow's
# -Djqwik.tries.default=100 flag for deeper interleaving coverage.
database = .jqwik-database
defaultSeed = 0
defaultTries = 20
defaultMaxDiscardRatio = 5
useJunitPlatformReporter = false
reportOnlyFailures = false
