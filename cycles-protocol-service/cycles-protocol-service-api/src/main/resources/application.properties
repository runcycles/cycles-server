# Cycles Protocol
server.port=7878
spring.application.name=cycles-protocol-service

# Redis Configuration
redis.host=${REDIS_HOST:localhost}
redis.port=${REDIS_PORT:6379}
redis.password=${REDIS_PASSWORD:}

# Jackson JSON Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=true
spring.jackson.default-property-inclusion=non_null

# Expiry sweep
cycles.expiry.interval-ms=5000

# Optional per-tenant index for the default sorted reservation query. Writers
# always dual-write the index; reads/backfill stay disabled by default so a
# multi-pod deployment can finish rolling out the new writer before cutover.
cycles.reservation-index.created-at.enabled=${RESERVATION_CREATED_AT_INDEX_ENABLED:false}
cycles.reservation-index.created-at.repair-interval-ms=${RESERVATION_CREATED_AT_INDEX_REPAIR_INTERVAL_MS:300000}
cycles.reservation-index.created-at.initial-delay-ms=${RESERVATION_CREATED_AT_INDEX_INITIAL_DELAY_MS:5000}
cycles.reservation-index.created-at.sweep-cron=${RESERVATION_CREATED_AT_INDEX_SWEEP_CRON:0 45 3 * * *}

# HTTP response compression
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=application/json

# Data retention: terminal reservation/event hashes auto-expire after 30 days (hardcoded in Lua scripts)

# Logging
logging.level.root=INFO
logging.level.io.runcycles.protocol=INFO
# Default: human-readable console output (override with LOGGING_STRUCTURED_FORMAT_CONSOLE=ecs for JSON in production)
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
# Set via env var in production: LOGGING_STRUCTURED_FORMAT_CONSOLE=ecs (Elastic Common Schema JSON)
# or LOGGING_STRUCTURED_FORMAT_CONSOLE=logstash (Logstash JSON format)

# OpenAPI/Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Graceful shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Actuator & Metrics
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when-authorized
# Kubernetes-style liveness/readiness probes: /actuator/health/liveness,
# /actuator/health/readiness. Readiness includes Redis; liveness stays
# process-only so dependency outages drain traffic instead of restarting pods.
management.endpoint.health.probes.enabled=true
management.endpoint.health.group.liveness.include=livenessState
management.endpoint.health.group.readiness.include=readinessState,redis
management.metrics.tags.application=cycles-protocol-service

# Webhook secret encryption (shared key with cycles-server-admin)
webhook.secret.encryption-key=${WEBHOOK_SECRET_ENCRYPTION_KEY:}

# v0.1.25.8 (cycles-protocol revision 2026-04-13): admin-on-behalf-of
# auth on a small set of reservation endpoints (list / get / release).
# Same key value as cycles-server-admin's ADMIN_API_KEY — admin
# operators authenticate against both planes with one key. When unset,
# X-Admin-API-Key on allowlisted paths returns 500 with a clear
# "server misconfiguration" error.
admin.api-key=${ADMIN_API_KEY:}

# Event/delivery retention TTL
events.retention.event-ttl-days=${EVENT_TTL_DAYS:90}
events.retention.delivery-ttl-days=${DELIVERY_TTL_DAYS:14}
events.retention.sweep-cron=${EVENT_RETENTION_SWEEP_CRON:0 30 3 * * *}
# Non-blocking runtime event emitter. The queue is bounded so a dispatch Redis
# outage or slow event persistence cannot grow heap without limit.
cycles.events.emit.threads=${CYCLES_EVENTS_EMIT_THREADS:0}
cycles.events.emit.queue-capacity=${CYCLES_EVENTS_EMIT_QUEUE_CAPACITY:10000}

# Fixed-window per-client-IP rate limit for the PUBLIC (unauthenticated)
# endpoints only: GET /v1/evidence/* and the CyclesEvidence JWKS. Implements
# the spec's SHOULD-level 429 throttling (error=LIMIT_EXCEEDED + Retry-After
# + X-RateLimit-Reset). Per instance, keyed on the socket peer address —
# behind an ingress that terminates connections, prefer rate limiting there
# and/or raise this limit.
cycles.public-rate-limit.enabled=${CYCLES_PUBLIC_RATE_LIMIT_ENABLED:true}
cycles.public-rate-limit.requests-per-minute=${CYCLES_PUBLIC_RATE_LIMIT_REQUESTS_PER_MINUTE:300}

# Audit log retention (v0.1.25.15+). Matches admin's authenticated tier
# default. Set to 0 for indefinite retention. audit.sweep.cron prunes
# stale ZSET index pointers whose target key has TTL-expired.
audit.retention.days=${AUDIT_RETENTION_DAYS:400}
audit.sweep.cron=${AUDIT_SWEEP_CRON:0 0 3 * * *}

# CyclesEvidence (cycles-evidence-v0.1) source queue. Lifecycle responses are
# LPUSH'd here for the event-tier worker to sign + serve as signed envelopes.
cycles.evidence.queue.pending-key=${EVIDENCE_PENDING_KEY:evidence:pending}
# CyclesEvidence envelope store key prefix for GET /v1/evidence/{id}. MUST match
# the event-tier writer (cycles-server-events EVIDENCE_STORE_KEY_PREFIX) and point
# at the same Redis, or served envelopes won't be found.
cycles.evidence.store.key-prefix=${EVIDENCE_STORE_KEY_PREFIX:evidence:envelope:}
# Public server identity for SYNCHRONOUS evidence_id computation + surfacing
# cycles_evidence on the response. These MUST match the event-tier worker's
# values or the worker dead-letters the record on the evidence_id cross-check.
# signer-did is PUBLIC (the hex Ed25519 public key) — never the private key.
# Property names + env vars are SHARED with the worker (cycles.evidence.server-id /
# EVIDENCE_SERVER_ID and cycles.evidence.signing.signer-did / EVIDENCE_SIGNING_SIGNER_DID)
# so one env var configures both services. When either is unset, evidence is off:
# no source record is queued and no evidence_id is computed or returned.
cycles.evidence.server-id=${EVIDENCE_SERVER_ID:}
cycles.evidence.signing.signer-did=${EVIDENCE_SIGNING_SIGNER_DID:}
# Signer JWK Set publication (getEvidenceJwks, GET /v1/.well-known/cycles-jwks.json).
# Served only when signer-did is a raw 64-hex key. kid: the JWK key id (defaults to
# the first 16 hex chars of the public key); nbf-ms: cycles_nbf_ms validity-from
# (epoch ms, inclusive; default 0 = valid since epoch, correct for a never-rotated key).
cycles.evidence.signing.kid=${EVIDENCE_SIGNING_KID:}
cycles.evidence.signing.nbf-ms=${EVIDENCE_SIGNING_NBF_MS:0}
# Retired signing keys retained in the published set (rotation history) so
# evidence signed before a rotation still verifies against the key valid at its
# issued_at_ms. JSON array of {"signer_did":<raw 64-hex>,"kid":...,"nbf_ms":...,
# "exp_ms":...}; exp_ms (EXCLUSIVE end of the key's window) is required per entry.
# On rotation: set the new active key as signer-did, set nbf-ms (above) to the
# rotation time, and append the old key here with exp_ms = that same rotation
# time, so the windows meet without overlapping. If nbf-ms is left below the
# latest retired exp_ms, the published active cycles_nbf_ms is warned on and
# fail-safe clamped up to that boundary (so the active key cannot resolve for
# pre-rotation issued_at_ms) — but set nbf-ms explicitly rather than relying on
# the clamp. Empty = single active key (never rotated).
cycles.evidence.signing.retired-keys=${EVIDENCE_SIGNING_RETIRED_KEYS:}
